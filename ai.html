<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainiac Buddy | Study Mart</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .ai-chat-container {
            max-width: 800px;
            margin: 150px auto 100px;
            min-height: 65vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--card-border);
            position: relative;
            z-index: 1;
        }
        .chat-header i { 
            font-size: 2rem; 
            color: #10b981;
            filter: drop-shadow(0 2px 4px rgba(16, 185, 129, 0.4));
        }
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 1;
        }
        .message { 
            max-width: 80%; 
            padding: 16px 20px; 
            border-radius: 20px; 
            font-size: 1rem;
            box-shadow: 4px 4px 10px var(--skeuo-shadow-light),
                        -4px -4px 10px var(--skeuo-highlight);
        }
        .bot { 
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05)); 
            color: var(--text-main); 
            align-self: flex-start; 
            border-bottom-left-radius: 0;
            border: 1px solid var(--card-border);
        }
        .user { 
            background: linear-gradient(145deg, var(--primary-light), var(--primary-dark)); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 0; 
            border: none;
            box-shadow: 4px 4px 10px var(--skeuo-shadow-light),
                        -4px -4px 10px var(--skeuo-highlight),
                        inset 0 1px 0 rgba(255,255,255,0.4);
        }
        .chat-input-area {
            padding: 24px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--card-border);
            position: relative;
            z-index: 1;
        }
        .ai-clip-btn {
            padding: 12px; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            box-shadow: 4px 4px 10px var(--skeuo-shadow-light),
                        -4px -4px 10px var(--skeuo-highlight);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .ai-clip-btn:hover {
            box-shadow: 6px 6px 14px var(--skeuo-shadow-dark),
                        -6px -6px 14px var(--skeuo-highlight);
            transform: translateY(-2px);
        }
        .ai-clip-btn:active {
            box-shadow: var(--btn-shadow-pressed);
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <script>
        // Apply saved theme immediately to prevent flash
        const savedTheme = localStorage.getItem('study-mart-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="ph-fill ph-student"></i>
                <span>Study<b>Mart</b></span>
            </a>
            <div class="nav-links">
                <a href="index.html#services" class="nav-link">Features</a>
                <a href="index.html#shop-finder" class="nav-link">Nearby Shops</a>
                <a href="books.html" class="nav-link">Marketplace</a>
                <a href="login.html" class="btn-primary">Sign In</a>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="theme-toggle" aria-label="Toggle Theme">
                    <i class="ph ph-sun"></i>
                </button>
                <button class="mobile-toggle" aria-label="Toggle Menu">
                    <i class="ph ph-list"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="ai-chat-container skeuo-chat">
        <div class="chat-header">
            <i class="ph-fill ph-robot"></i>
            <div>
                <h2 style="font-size: 1.5rem; font-weight: 700;">Brainiac Buddy</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Your personal AI study assistant</p>
            </div>
        </div>
        <div class="chat-messages">
            <div class="message bot">
                Hey there! 👋 I'm Brainiac Buddy. Upload your PDF notes or ask me any question to get started!
            </div>
            <div class="message user">
                Can you summarize chapter 4 of Data Structures for me?
            </div>
        </div>
        <div class="chat-input-area">
            <button class="ai-clip-btn">
                <i class="ph ph-paperclip" style="font-size: 1.5rem;"></i>
            </button>
            <input type="text" class="skeuo-input" placeholder="Message Brainiac Buddy or type '/quiz'..." style="border-radius: 100px;">
            <button class="btn-primary" style="padding: 12px 24px; border-radius: 100px; display: flex; align-items: center; justify-content: center;">
                <i class="ph-bold ph-paper-plane-right" style="font-size: 1.2rem;"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
